# ============================================================
# Test Configuration - Uses H2 in-memory database for testing
# No MySQL required for running tests
# ============================================================

# Server Configuration
server.port=8080

# H2 In-Memory Database for Testing
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA Configuration for Testing
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# JWT Configuration for Testing
app.jwt.secret=TestSecretKeyForJwtTokenGenerationMustBe256BitsLong!!
app.jwt.expiration-ms=86400000

# Disable mail configuration for testing
spring.mail.host=localhost
spring.mail.port=25

# Logging
logging.level.org.springframework.security=DEBUG
logging.level.com.studenttoolkit.backend=DEBUG
