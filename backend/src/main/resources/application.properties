# ============================================================
# Server Configuration
# ============================================================
server.port=8080
server.servlet.context-path=

# ============================================================
# Database Configuration (MySQL)
# Update database name, username, and password as per your local installation
# ============================================================
spring.datasource.url=jdbc:mysql://localhost:3306/student_toolkit_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ============================================================
# JPA/Hibernate Configuration
# ddl-auto=update will automatically create/update tables based on entities
# In production, change to 'validate' and use migration tools like Flyway
# ============================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ============================================================
# JWT Configuration
# These values are used by JwtUtil for token generation and validation
# In production, use environment variables or a secrets manager
# ============================================================
app.jwt.secret=MySuperSecretJwtKeyForStudentToolkit2024MustBe256BitsLong!!
app.jwt.expiration-ms=86400000
# Token expiration: 24 hours (86400000 milliseconds)

# ============================================================
# Spring Mail Configuration (for contact form notifications)
# Configure with your SMTP provider (e.g., Gmail, SendGrid)
# ============================================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your-email@gmail.com
spring.mail.password=your-email-app-password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ============================================================
# Logging Configuration
# ============================================================
logging.level.org.springframework.web=INFO
logging.level.org.springframework.security=DEBUG
logging.level.com.studenttoolkit.backend=DEBUG
logging.level.org.hibernate.SQL=DEBUG

# ============================================================
# File Upload Configuration (for notes upload)
# ============================================================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
